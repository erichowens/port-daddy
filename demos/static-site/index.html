<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Static Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; background: #0c0a1a; color: #eef0f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(20,16,48,0.65); border: 1px solid rgba(0,229,255,0.1); border-radius: 16px; padding: 48px; max-width: 480px; text-align: center; backdrop-filter: blur(12px); }
    h1 { font-size: 2rem; background: linear-gradient(90deg, #00e5ff, #7c4dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    p { color: #a8adb8; line-height: 1.6; }
    .badge { display: inline-block; background: rgba(0,229,255,0.15); color: #00e5ff; border-radius: 999px; padding: 4px 12px; font-size: 0.8rem; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Port Daddy Demo</h1>
    <p>This static site is managed by Port Daddy. Its port was claimed automatically during project scan.</p>
    <span class="badge">Served on dynamic port</span>
  </div>
</body>
</html>

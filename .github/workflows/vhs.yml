name: VHS Tape Generation
on:
  push:
    paths:
      - 'demos/*.tape'
      - 'lib/**'
      - 'cli/**'
  workflow_dispatch:

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install pd CLI
        run: npm install -g .
      - name: Install vhs
        run: go install github.com/charmbracelet/vhs@latest
      - name: Run VHS
        run: ~/go/bin/vhs < demos/demo.tape
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update VHS demos [skip ci]"
          file_pattern: "demos/*.gif demos/*.mp4 demos/*.txt"
